name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # 메인 브랜치에 코드가 올라올 때마다 실행

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 소스 코드 가져오기
      - uses: actions/checkout@v3

      # 2. Flutter 환경 설정
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0' # 최신 안정 버전 권장

      # 3. 라이브러리 설치 (pubspec.yaml 읽기)
      - run: flutter pub get

      # 4. 웹 빌드 (중요: base-href 경로 설정)
      - name: Build Web
        run: flutter build web --release --base-href "/intl-law-practice/"

      # 5. 빌드된 파일을 gh-pages 브랜치로 배포
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
